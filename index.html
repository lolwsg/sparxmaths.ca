<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Game Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0d1a;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #8888aa;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid #333355;
            background: #1a1a2e;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .search-box input:focus {
            border-color: #f7971e;
            box-shadow: 0 0 20px rgba(247, 151, 30, 0.2);
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .game-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 14px 10px;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid #2a2a44;
            cursor: pointer;
            text-decoration: none;
            color: #c8c8e8;
            font-size: 0.85rem;
            word-break: break-word;
        }
        .game-card:hover {
            background: #2a2a4e;
            transform: translateY(-3px);
            border-color: #f7971e;
            box-shadow: 0 6px 20px rgba(247, 151, 30, 0.15);
        }
        .game-card .icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 6px;
        }
        .game-card .name {
            display: block;
            line-height: 1.3;
        }
        .counter {
            text-align: center;
            margin: 20px 0 10px;
            color: #666688;
            font-size: 0.9rem;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #444466;
            font-size: 0.8rem;
            border-top: 1px solid #1a1a2e;
            padding-top: 20px;
        }
        @media (max-width: 600px) {
            .game-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 8px;
            }
            .game-card {
                padding: 10px 6px;
                font-size: 0.75rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <h1>🎮 Game Vault</h1>
    <p class="subtitle">All your games — no "/game/" in sight</p>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Search games..." onkeyup="filterGames()">
    </div>
    <div class="counter" id="counter">Loading...</div>
    <div class="game-grid" id="gameGrid"></div>
    <div class="footer">⚡ Hosted on GitHub Pages • All files in root • Clean URLs</div>

    <script src="data.js"></script>
    <script>
        // The game data is loaded from data.js (global variable 'games')
        let allGames = [];

        // This function runs when data.js loads
        function initGameLibrary() {
            if (typeof games !== 'undefined' && Array.isArray(games)) {
                allGames = games;
                renderGames(allGames);
            } else {
                document.getElementById('gameGrid').innerHTML = '<p style="text-align:center;color:#ff6b6b;">❌ Error: Game data not found. Make sure data.js is present.</p>';
            }
        }

        function renderGames(gameList) {
            const grid = document.getElementById('gameGrid');
            const counter = document.getElementById('counter');
            
            if (!gameList || gameList.length === 0) {
                grid.innerHTML = '<p style="text-align:center;color:#8888aa;grid-column:1/-1;">No games found.</p>';
                counter.textContent = '0 games';
                return;
            }

            // Sort alphabetically by name
            const sorted = [...gameList].sort((a, b) => a.name.localeCompare(b.name));
            
            let html = '';
            sorted.forEach(game => {
                // IMPORTANT: Link directly to the .html file in the SAME folder (root)
                // NO "game/" prefix, NO subfolder — just the filename
                const filePath = game.file; // e.g., "clabandoned.html"
                html += `
                    <a href="${filePath}" class="game-card">
                        <span class="icon">${game.icon || '🎮'}</span>
                        <span class="name">${game.name}</span>
                    </a>
                `;
            });
            
            grid.innerHTML = html;
            counter.textContent = `${sorted.length} games`;
        }

        function filterGames() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                renderGames(allGames);
                return;
            }
            const filtered = allGames.filter(g => 
                g.name.toLowerCase().includes(query) || 
                g.file.toLowerCase().includes(query)
            );
            renderGames(filtered);
        }

        // Wait for data.js to load, then init
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            initGameLibrary();
        } else {
            document.addEventListener('DOMContentLoaded', initGameLibrary);
        }

        // Also re-run if data.js loads after (just in case)
        setTimeout(initGameLibrary, 500);
    </script>
</body>
</html>
